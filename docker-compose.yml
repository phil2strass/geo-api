services:
  db:
    image: postgres:16-alpine
    container_name: geo2-db
    environment:
      POSTGRES_DB: geo2
      POSTGRES_USER: geo
      POSTGRES_PASSWORD: geo
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo -d geo2"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geo-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: geo-api
      APP_ENV: dev
      DATABASE_URL: postgresql+psycopg://geo:geo@db:5432/geo2
    ports:
      - "8000:8000"

volumes:
  pgdata:
